name: skills
owner: talktoajayprakash
skills:
  - name: spotify
    path: .agentskills/spotify
    description: Search songs, manage playlists, control playback queue, and
      play/pause on Spotify. Use when the user asks anything about Spotify —
      music, playlists, queue, playing, searching for songs.
  - name: gmail
    path: .agentskills/gmail
    description: Send, draft, read, reply, forward, and triage Gmail emails using
      the gws CLI. Use when the user asks to do anything with email.
  - name: gws-google-docs
    path: .agentskills/gws-google-docs
    description: Read and edit Google Docs using the gws CLI — insert, delete,
      replace text, apply formatting, manage headings, lists, tables, and
      images. Use when the user asks to read, edit, update, or format a Google
      Doc.
